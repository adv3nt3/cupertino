name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Universal Binary
    runs-on: macos-15

    # Job-level env makes the secret values reachable from step-level
    # `if:` conditions. Steps that actually use the secrets re-declare
    # them in their own env block (kept narrow for clarity).
    env:
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Show Swift Version
        run: swift --version

      - name: Build for arm64
        working-directory: Packages
        run: |
          swift build -c release --arch arm64
          cp .build/release/cupertino ../cupertino-arm64
          # Copy resource bundle (only need one, it's the same for both archs)
          cp -R .build/arm64-apple-macosx/release/Cupertino_Resources.bundle ../

      - name: Build for x86_64
        working-directory: Packages
        run: |
          swift build -c release --arch x86_64
          cp .build/release/cupertino ../cupertino-x86_64

      - name: Create Universal Binary
        run: |
          lipo -create -output cupertino \
            cupertino-arm64 \
            cupertino-x86_64

          # Verify it's universal
          lipo -info cupertino

          # Show size
          ls -lh cupertino

      - name: Note Unsigned Build
        if: env.APPLE_CERTIFICATE_P12 == ''
        run: |
          echo "::warning::Apple signing secrets not configured — releasing unsigned binary."
          echo "Users will hit Gatekeeper warnings on first run; recommend right-click → Open or 'xattr -d com.apple.quarantine'."
          echo "To enable signing add these repo secrets: APPLE_CERTIFICATE_P12, APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID, APPLE_SIGNING_IDENTITY."

      - name: Install Certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Set keychain as default
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Code Sign
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "::error::APPLE_CERTIFICATE_P12 is set but APPLE_SIGNING_IDENTITY is missing. Add it as a repo secret (e.g. 'Developer ID Application: Your Name (TEAMID)')."
            exit 1
          fi
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" cupertino
          codesign -dv --verbose=4 cupertino

      - name: Notarize
        if: env.APPLE_CERTIFICATE_P12 != '' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent cupertino cupertino.zip

          # Submit for notarization
          xcrun notarytool submit cupertino.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Note: Cannot staple to standalone binary, only to .app/.dmg/.pkg
          # The binary is notarized - macOS will verify online

      - name: Create Release Archive
        run: |
          # Get version from tag
          VERSION=${GITHUB_REF#refs/tags/}

          # Create archive with binary and resource bundle
          tar -czvf cupertino-${VERSION}-macos-universal.tar.gz cupertino Cupertino_Resources.bundle

          # Calculate checksum
          shasum -a 256 cupertino-${VERSION}-macos-universal.tar.gz > cupertino-${VERSION}-macos-universal.tar.gz.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            cupertino-*.tar.gz
            cupertino-*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}